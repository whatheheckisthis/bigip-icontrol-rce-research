syntax = "proto3";
package control.v1;

message ControlRecord { string asvs_id = 1; string owasp_id = 2; string description = 3; string status = 4; }
message ListControlsRequest {}
message ListControlsResponse { repeated ControlRecord controls = 1; }
service ControlService { rpc ListControls(ListControlsRequest) returns (ListControlsResponse); }
