syntax = "proto3";
package reconciliation.v1;

enum Strategy { STRATEGY_UNSPECIFIED = 0; LATEST_WINS = 1; MANUAL = 2; }
message ConflictDetail { string entity_id = 1; string field_name = 2; string current_value = 3; string incoming_value = 4; Strategy strategy = 5; }
message ResolveRequest { ConflictDetail conflict = 1; }
message ResolveResponse { bool resolved = 1; string resolution_note = 2; }
service ReconciliationService { rpc Resolve(ResolveRequest) returns (ResolveResponse); }
