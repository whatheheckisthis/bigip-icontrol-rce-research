// Path       : proto/reconciliation.proto
// Purpose    : Defines conflict reconciliation contracts and audit access.
// Layer      : proto
// SDLC Phase : design
// ASVS Ref   : V7.1.1
// OWASP Ref  : A09
// Modified   : 2026-04-11
syntax = "proto3";

package reconciliation.v1;

enum ResolutionStrategy {
  LATEST_WINS = 0;
  SOURCE_PRIORITY = 1;
  MANUAL = 2;
}

message ConflictDetail {
  string field_name = 1;
  string existing_value = 2;
  string incoming_value = 3;
}

message ConflictRecord {
  string record_id = 1;
  string record_type = 2;
  map<string, ConflictDetail> conflicts = 3;
  ResolutionStrategy strategy = 4;
  int64 resolved_at = 5;
  string resolved_by = 6;
}

message SubmitConflictRequest { ConflictRecord conflict = 1; }
message SubmitConflictResponse { string conflict_id = 1; }
message ResolveConflictRequest {
  string conflict_id = 1;
  ResolutionStrategy strategy = 2;
  string operator_id = 3;
}
message ResolveConflictResponse { ConflictRecord conflict = 1; }
message GetAuditTrailRequest { string record_id = 1; }
message GetAuditTrailResponse { repeated string trail_rows = 1; }
message ListUnresolvedRequest {}
message ListUnresolvedResponse { repeated ConflictRecord conflicts = 1; }

service ReconciliationService {
  rpc SubmitConflict(SubmitConflictRequest) returns (SubmitConflictResponse);
  rpc ResolveConflict(ResolveConflictRequest) returns (ResolveConflictResponse);
  rpc GetAuditTrail(GetAuditTrailRequest) returns (GetAuditTrailResponse);
  rpc ListUnresolved(ListUnresolvedRequest) returns (ListUnresolvedResponse);
}
