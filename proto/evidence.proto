syntax = "proto3";

package bigip.research.v1;

enum ArtefactType {
  LOG = 0;
  CONFIG = 1;
  TEST_RESULT = 2;
  TRACE = 3;
  CROSSWALK = 4;
}

message EvidenceRecord {
  string evidence_id = 1;
  ArtefactType artefact_type = 2;
  string source_service = 3;
  string content_hash = 4;
  string content_uri = 5;
  repeated string lineage = 6;
  string created_at = 7;
  string operator_id = 8;
}

message RecordEvidenceRequest { EvidenceRecord evidence = 1; }
message RecordEvidenceResponse { string evidence_id = 1; }
message GetEvidenceRequest { string evidence_id = 1; }
message GetEvidenceResponse { EvidenceRecord evidence = 1; }
message ChainLineageRequest { string evidence_id = 1; repeated string lineage = 2; }
message ChainLineageResponse { bool updated = 1; }
message ExportLedgerRequest {}
message ExportLedgerResponse { bytes ledger = 1; }

service EvidenceService {
  rpc RecordEvidence(RecordEvidenceRequest) returns (RecordEvidenceResponse);
  rpc GetEvidence(GetEvidenceRequest) returns (GetEvidenceResponse);
  rpc ChainLineage(ChainLineageRequest) returns (ChainLineageResponse);
  rpc ExportLedger(ExportLedgerRequest) returns (ExportLedgerResponse);
}
