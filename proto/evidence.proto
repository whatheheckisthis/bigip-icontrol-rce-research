syntax = "proto3";
package evidence.v1;

message EvidenceRecord { string evidence_id = 1; string event_type = 2; string payload_json = 3; string sha256 = 4; string created_at = 5; }
message AppendEvidenceRequest { EvidenceRecord record = 1; }
message AppendEvidenceResponse { bool stored = 1; }
message ExportLedgerRequest {}
message ExportLedgerResponse { repeated EvidenceRecord records = 1; }
service EvidenceService {
  rpc AppendEvidence(AppendEvidenceRequest) returns (AppendEvidenceResponse);
  rpc ExportLedger(ExportLedgerRequest) returns (ExportLedgerResponse);
}
