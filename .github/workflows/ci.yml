# ============================================================
# Repository : bigip-icontrol-rce-research
# Path       : .github/workflows/ci.yml
# Purpose    : CI pipeline for linting, audit, unit tests, and ASVS verification
# Layer      : config
# SDLC Phase : verification
# ASVS Ref   : V14.2, V14.3
# OWASP Ref  : A06, A08
# Modified   : 2026-04-10
# ============================================================
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - run: make audit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: pytest -m unit --cov=services --cov-report=xml

  asvs:
    runs-on: ubuntu-latest
    needs: [lint, audit, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: make services-detach
      - run: make asvs
      - uses: actions/upload-artifact@v4
        with:
          name: asvs-matrix
          path: sdlc/verification/asvs_test_matrix.csv
