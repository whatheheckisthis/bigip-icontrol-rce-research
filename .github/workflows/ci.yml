# Repository : bigip-icontrol-rce-research
# Path       : .github/workflows/ci.yml
# Purpose    : Defines CI gates for lint, audit, unit, and ASVS stages.
# Layer      : config
# SDLC Phase : verification
# ASVS Ref   : N/A
# OWASP Ref  : N/A
# Modified   : 2026-04-11
name: CI
on:
  push:    { branches: [main, dev] }
  pull_request: { branches: [main] }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - run: make audit

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: pytest -m unit --cov=services --cov-report=xml
      - uses: codecov/codecov-action@v4

  asvs:
    runs-on: ubuntu-latest
    needs: [lint, audit, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: make services-detach
      - run: sleep 10
      - run: make asvs
      - uses: actions/upload-artifact@v4
        with:
          name: asvs-matrix
          path: sdlc/verification/asvs_test_matrix.csv
