# Repository : bigip-icontrol-rce-research
# Path       : .github/workflows/ci.yml
# Purpose    : Defines CI gates for lint, audit, unit, and ASVS stages.
# Layer      : config
# SDLC Phase : verification
# ASVS Ref   : N/A
# OWASP Ref  : N/A
# Modified   : 2026-04-11
name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  branch-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! echo "$BRANCH" | grep -qE \
            '^(feat|fix|chore|sdlc|gap|release)/[a-z][a-z0-9-]+$'; then
            echo "Branch name '$BRANCH' does not match convention."
            echo "Required: <type>/<scope>-<description>"
            echo "Types: feat fix chore sdlc gap release"
            exit 1
          fi

  commit-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to   ${{ github.event.pull_request.head.sha }} \
            --verbose \
            --config .github/commitlint.config.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements-dev.txt
      - run: make lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements-dev.txt
      - run: make audit

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run audit:deps
      - run: npm run audit:licenses

  unit:
    runs-on: ubuntu-latest
    needs: [branch-lint, commit-lint, lint, audit, npm-audit]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: pytest -m unit --cov=services --cov-report=xml
      - uses: codecov/codecov-action@v4

  asvs:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make proto
      - run: make services-detach
      - run: sleep 10
      - run: make asvs
      - uses: actions/upload-artifact@v4
        with:
          name: asvs-matrix
          path: sdlc/verification/asvs_test_matrix.csv
